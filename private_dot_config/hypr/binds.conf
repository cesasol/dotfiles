# Lines ending with `# [hidden]` won't be shown on cheatsheet
# Lines starting with #! are section headings

##! Multimedia
$audio_in  = @DEFAULT_AUDIO_SOURCE@
$audio_out = @DEFAULT_AUDIO_SINK@
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume $audio_out 5%+ # [hidden]
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume $audio_out 5%- # [hidden]
bindel = ,XF86AudioMute,        exec, wpctl set-mute $audio_out toggle # [hidden]
bindel = ,XF86AudioMicMute,     exec, wpctl set-mute $audio_in toggle # [hidden]

##! Screen gamma
bindel = ,XF86MonBrightnessDown, exec, hyprctl hyprsunset gamma -10
bindel = ,XF86MonBrightnessUp, exec, hyprctl hyprsunset gamma +10

##!
    
binds {
    drag_threshold = 10  # Fire a drag event only after dragging for more than 10px
}

##! Actions
# Screenshot, Record, OCR, Color picker, Clipboard history
# bind = $mod, V,             exec, cliphist list | rofi -dmenu -display-columns 2 | cliphist decode | wl-copy  # Clipboard history >> clipboard
bind = $mod, V,             exec, clipvault list | rofi -dmenu -display-columns 2 | clipvault get | wl-copy
bind = $mod, Period,        exec, rofi -show emoji # Pick emoji >> clipboard
# OCR
bind = $mod+Shift, T,       exec, hyprshot -z -m region --raw | tesseract - - -l eng | wl-copy && dunstify -a OCR Captured "$(wl-paste)" && espeak "$(wl-paste)"  # Screen snip to text >> clipboard
# Color picker
bind = $mod+Shift, C,       exec, hyprpicker -a # Pick color (Hex) >> clipboard
# Window screenshot
bindl= , Print,             exec, hyprshot -m active -m window # Window screenshot
bindl= Ctrl, Print,         exec, hyprshot -m active -m output # Output screenshot
# Area screenshot
bind = Shift, Print,        exec, hyprshot -m region -z # Region
bind = Ctrl+Shift, Print,   exec, hyprshot -m region -z -- mirage # Screen snip >> edit
# Recording stuff
bind = $mod, R,             exec, uwsm app io.github.seadve.Kooha # Record region (no sound)
##! Session
bind = $mod, L,             exec, hyprlock # Lock
bindl = $mod+Shift, L,      exec, sleep 0.1 && systemctl suspend || loginctl suspend # Suspend system

#!
##! Window management
bind = $mod, Q, killactive,
bind = $mod+Shift, Q, exec, hyprctl kill # Pick and kill a window


#!
##! Grouping
bind = $mod,       G, togglegroup
bind = $mod+Shift, G, moveoutofgroup

# Focusing
#/# bind = $mod, ←/↑/→/↓,, # Move focus in direction
# hy3 layout
bind = $mod, Left, movefocus, l # [hidden]
bind = $mod, Right, movefocus, r # [hidden]
bind = $mod, Up, movefocus, u # [hidden]
bind = $mod, Down, movefocus, d # [hidden]
bind = $mod, BracketLeft, movefocus, l # [hidden]
bind = $mod, BracketRight, movefocus, r # [hidden]
bindm = $mod, mouse:273, resizewindow
bindm = $mod, mouse:272, movewindow
bindc = $mod, mouse:274, togglefloating

# bind = $mod, Left movefocus, 1


##! Window arrangement
#/# bind = $mod+Shift, ←/↑/→/↓,, # Window: move in direction
# bind = $mod+Shift, Left, movewindow, l # [hidden]
# bind = $mod+Shift, Right, movewindow, r # [hidden]
# bind = $mod+Shift, Up, movewindow, u # [hidden]
# bind = $mod+Shift, Down, movewindow, d # [hidden]

bind = $mod+Shift, Left, movewindoworgroup, l # [hidden]
bind = $mod+Shift, Right, movewindoworgroup, r # [hidden]
bind = $mod+Shift, Up, movewindoworgroup, u # [hidden]
bind = $mod+Shift, Down, movewindoworgroup, d # [hidden]

# Window split ratio
#/# binde = $mod, +/-,, # Window: split ratio +/- 0.1
binde = $mod, Minus, splitratio, -0.1 # [hidden]
binde = $mod, Equal, splitratio, +0.1 # [hidden]
binde = $mod, Semicolon, splitratio, -0.1 # [hidden]
binde = $mod, Apostrophe, splitratio, +0.1 # [hidden]

# Positioning mode
bind = $mod, Space, togglefloating, active
bind = $mod, Space, pin
bind = $mod, P, pseudo
bind = $mod, F, fullscreen, 0

#!
##! Workspace navigation
# Switching
# https://github.com/Duckonaut/split-monitor-workspaces
#/# bind = $mod, Hash,, # Focus workspace # (1, 2, 3, 4, ...)
bind = $mod, 1, split-workspace, 1 # [hidden]
bind = $mod, 2, split-workspace, 2 # [hidden]
bind = $mod, 3, split-workspace, 3 # [hidden]
bind = $mod, 4, split-workspace, 4 # [hidden]
bind = $mod, 5, split-workspace, 5 # [hidden]
bind = $mod, 6, split-workspace, 6 # [hidden]
bind = $mod, 7, split-workspace, 7 # [hidden]
bind = $mod, 8, split-workspace, 8 # [hidden]
bind = $mod, 9, split-workspace, 9 # [hidden]
bind = $mod, 0, split-workspace, 10 # [hidden]

#/# bind = Ctrl+$mod, ←/→,, # Workspace: focus left/right
bind = Ctrl+$mod, Right, split-workspace, e+1 # [hidden]
bind = Ctrl+$mod, Left, split-workspace, e-1 # [hidden]
#/# bind = $mod, Scroll ↑/↓,, # Workspace: focus left/right
# Scroll through existing workspaces with mod + scroll
bind = $mod, mouse_down, split-workspace, e+1
bind = $mod, mouse_up, split-workspace, e-1
bind = Ctrl+$mod, mouse_up, split-workspace, e+1 # [hidden]
bind = Ctrl+$mod, mouse_down, split-workspace, e-1 # [hidden]
#/# bind = $mod, Page_↑/↓,, # Workspace: focus left/right
bind = $mod, Page_Down, split-workspace, e+1 # [hidden]
bind = $mod, Page_Up, split-workspace, e-1 # [hidden]
bind = Ctrl+$mod, Page_Down, split-workspace, e+1 # [hidden]
bind = Ctrl+$mod, Page_Up, split-workspace, e-1 # [hidden]

## special workspace (scratchpad)
bind = $mod, S, togglespecialworkspace, social
bind = $mod SHIFT, S, movetoworkspace, special:social # [hidden]

##! Workspace management
# Move window to workspace $mod + Alt + [0-9]
#/# bind = $mod+Alt, Hash,, # Window: move to workspace # (1, 2, 3, 4, ...)
bind = $mod SHIFT, 1, split-movetoworkspace, 1 # [hidden]
bind = $mod SHIFT, 2, split-movetoworkspace, 2 # [hidden]
bind = $mod SHIFT, 3, split-movetoworkspace, 3 # [hidden]
bind = $mod SHIFT, 4, split-movetoworkspace, 4 # [hidden]
bind = $mod SHIFT, 5, split-movetoworkspace, 5 # [hidden]
bind = $mod SHIFT, 6, split-movetoworkspace, 6 # [hidden]
bind = $mod SHIFT, 7, split-movetoworkspace, 7 # [hidden]
bind = $mod SHIFT, 8, split-movetoworkspace, 8 # [hidden]
bind = $mod SHIFT, 9, split-movetoworkspace, 9 # [hidden]
bind = $mod SHIFT, 0, split-movetoworkspace, 10 # [hidden]


bind = Ctrl+$mod+Shift, Right, split-movetoworkspace, e+1 # [hidden]
bind = Ctrl+$mod+Shift, Left, split-movetoworkspace, e-1 # [hidden]
#/# bind = $mod+Shift, Scroll ↑/↓,, # Window: move to workspace left/right
bind = $mod+Shift, mouse_down, split-movetoworkspace, e-1 # [hidden]
bind = $mod+Shift, mouse_up, split-movetoworkspace, e+1 # [hidden]
bind = $mod+Alt, mouse_down, split-movetoworkspace, e-1 # [hidden]
bind = $mod+Alt, mouse_up, split-movetoworkspace, e+1 # [hidden]
#/# bind = $mod+Shift, Page_↑/↓,, # Window: move to workspace left/right
bind = $mod+Alt, Page_Down, split-movetoworkspace, e+1 # [hidden]
bind = $mod+Alt, Page_Up, split-movetoworkspace, e-1 # [hidden]
bind = $mod+Shift, Page_Down, split-movetoworkspace, e+1  # [hidden]
bind = $mod+Shift, Page_Up, split-movetoworkspace, e-1  # [hidden]


bind = Alt, Tab, cyclenext # [hidden] sus keybind
bind = Alt, Tab, bringactivetotop, # [hidden] bring it to the top

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

##! Apps
bind = $mod, Return, exec, uwsm app kitty
bind = $mod, D, exec, $menu

# Gamescope
# bindn = SUPER, F, pass, class:^(gamescope)$
# bindn = SUPER, N, pass, class:^(gamescope)$
